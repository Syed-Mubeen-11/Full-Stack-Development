<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cure Clinic</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <main>
    <h1>Login</h1>
    <p id="msg">Welcome back user Login to your account!</p>
    <div class="input">
      <p id="mail">Email<p>
      <input type="email" id="e-mail" placeholder="Enter your email">
    </div>
    <div class="input">
      <p id="pass">Password</p>
      <input type="password" id="passw" placeholder="Enter your password">
    </div>
    <button class="btn" onclick="validate()">Login</button>
    <div class="form-message">
      <p id="c-msg"></p>
    </div>
    <div class="auth-link">
      <p>Don't have an account?</p>
      <p id="link"><a href="signup.html">Signup</a> </p>
    </div>
  </main>
</body>
<script src="login.js"></script>
</html>
