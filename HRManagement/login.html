<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HRPro - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav id="navbar">
    <div class="logo">HRPro</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="employees.html">Employees</a></li>
      <li><a href="attendance.html">Attendance</a></li>
      <li><a href="payroll.html">Payroll</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="auth-buttons">
      <button id="loginBtn">Login</button>
      <button id="signupBtn" onclick="location.href='signup.html'">Signup</button>
      <button id="logoutBtn" style="display:none;">Logout</button>
    </div>
  </nav>

  <form id="loginForm">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button type="submit">Login</button>
  </form>

  <footer>
    <p>Company Address: 123 HRPro Street, City</p>
    <p>Working Days: Mon-Fri | Timings: 9am - 6pm</p>
    <p>Support: hr@hrpro.com</p>
    <p>Copyright © 2026 HRPro</p>
  </footer>

  <script src="js/main.js"></script>
  <script>
    const loginForm = document.getElementById("loginForm");

    loginForm.addEventListener("submit",(e)=>{
      e.preventDefault();
      const email=document.getElementById("email").value.trim();
      const password=document.getElementById("password").value;

      const users=JSON.parse(localStorage.getItem("users")) || [];
      const user=users.find(u=>u.email===email && u.password===password);

      if(user){
        localStorage.setItem("currentUser", JSON.stringify(user));
        window.location.href="index.html";
      }else{
        alert("Invalid credentials");
      }
    });
  </script>
</body>
</html>
