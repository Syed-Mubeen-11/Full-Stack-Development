<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Snap Shop</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <!-- Auth Page Wrapper -->
  <main class="auth-page">

    <!-- Login Card -->
    <section class="auth-card">
      <h2 class="auth-title">Login</h2>
      <p class="auth-subtitle">Welcome back! Please login to your account</p>
      <form class="auth-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" class="form-input" placeholder="Enter your email"/>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="Enter your password"/>
        </div>
        <!-- Error / Success message (JS later) -->
        <p class="form-message"></p>
        <button type="submit" class="auth-btn">Login</button>
      </form>
      <p class="auth-link">
        Don’t have an account?
        <a href="signup.html">Sign up</a>
      </p>
    </section>

  </main>
</body>
<script src="login.js"></script>

</html>
